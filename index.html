<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ankit's Project</title>
    <link rel="stylesheet" href="Css/index.css">
    <!-- Fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
</head>
<body>
    <header>
        <h1 >Ankit's Project</h1>
        
        <ul class="nav-links">
            <li><a href="https://www.github.com/iamankit056">
                <i class="fa-brands fa-github"></i>
                <i>Github</i>
            </a></li>
            <li><a href="https://learn.unity.com/u/iamankit056">
                <i class="fa-brands fa-unity"></i>
                <i>Unity</i>
            </a></li>
            <li><a href="https://www.linkedin.com/in/iamankit056">
                <i class="fa-brands fa-linkedin"></i>
                <i>Linked in</i>
            </a></li>
            <li><a href="https://www.github.com/iamankit056/iamankit056.github.io">
                <i class="fa-sharp fa-solid fa-link"></i>
                <i>Source Code</i>
            </a></li>
        </ul>

        <div class="toggle-btn" onclick="NavigationWindow()">
            <i class="fa-solid fa-ellipsis-vertical fa-xl"></i>          
        </div>
    </header>
    <section>
        <h1 class="title">All Games</h1>

        <div class="game-collection">
            <div class="game">
                <a href="Html/CarDrivingGame.html" class="game-link">
                    <img src="Images/CarDrivingGame.png" alt="Game Image" class="game-image">
                    <h2 class="game-title">Car Driving</h2>
                </a>
            </div>
            <div class="game">
                <a href="Html/SnakeGame.html" class="game-link">
                    <img src="Images/SnakeGame.png" alt="Game Image" class="game-image">
                    <h2 class="game-title">Snake Game</h2>
                </a>
            </div>
        </div>
    </section>

    <!-- Internal Script -->
    <script>
        const navLinks = document.querySelector('.nav-links');
        let hasNavigationWindowActive = false;

        function NavigationWindow()
        {
            if(hasNavigationWindowActive) {
                navLinks.style.left = '100%';
                hasNavigationWindowActive = false;
            }
            else {
                navLinks.style.left = '40%';
                hasNavigationWindowActive = true;
            }
        }

        for(let i=0; i < navLinks.children.length; i++) {
            navLinks.children[i].addEventListener('click', function() {
                navLinks.style.left = '100%';
            })
        }
    </script>
</body>
</html>
