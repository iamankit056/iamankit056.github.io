<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Car Driving Game | Ankit's Project</title>

    <!-- Fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

    <link rel="stylesheet" href="../Css/style.css">
    <script defer src="../Scripts/CarDrivingGame.js"></script> 
    
    <!-- Internal styling -->
    <style>
        canvas {
            background-color: rgb(0, 255, 0);
        }
        #game-assets {
            display: none;
        }
    </style>
</head>
<body>
    <canvas>This Game does not support your browser.</canvas>
    <button onclick="Gameplay()">Play</button>
    <a href="../index.html" class="home-icon">
        <i class="fa-solid fa-house-chimney fa-xl" style="color: white;"></i>
    </a>  

    <!-- Import all images and sound effect file -->
    <div id="game-assets">
        <!-- Images -->
        <img src="../Images/Cars.png" alt="Cars Image" id="cars">
        <img src="../Images/Road.png" alt="Road Image" id="road">
        <!-- Sound Effects -->
        <audio src="../Sound_Effects/Crash.mp3" id="crashSoundEffect"></audio>
        <audio src="../Sound_Effects/Start.mp3" id="startSoundEffect"></audio>
        <audio src="../Sound_Effects/Driving.mp3" id="drivingSoundEffect"></audio>
        <audio src="../Sound_Effects/CountDown.mp3" id="countDownSoundEffect"></audio>
    </div>
</body>
</html>
